<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phone Motion Visualizer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:linear-gradient(135deg,#050816,#0f172a,#1e293b);font-family:Arial,sans-serif;color:#fff}
#container{width:100vw;height:100vh;display:flex;justify-content:center;align-items:center;perspective:1200px}
#board{width:320px;height:320px;border:3px solid rgba(255,255,255,.3);border-radius:25px;position:relative;transform-style:preserve-3d;background:rgba(255,255,255,.05);box-shadow:0 0 40px cyan;overflow:hidden}
#ball{width:45px;height:45px;border-radius:50%;position:absolute;left:138px;top:138px;background:radial-gradient(circle at 30% 30%,#fff,#0ff,#06f);box-shadow:0 0 30px cyan}
.grid{position:absolute;width:100%;height:100%;background-image:linear-gradient(rgba(255,255,255,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.08) 1px,transparent 1px);background-size:32px 32px}
#hud{position:absolute;top:15px;left:15px;width:330px;padding:12px;border-radius:15px;background:rgba(0,0,0,.4);line-height:1.7}
button{margin-top:10px;padding:10px 18px;border:none;border-radius:10px;background:#00d4ff;color:#000;font-weight:bold;cursor:pointer}
h2{color:#0ff}
</style>
</head>
<body>
<div id="hud">
<h2>📱 Motion Visualizer</h2>
<div id="ori"></div>
<div id="acc"></div>
<div id="gyro"></div>
<button onclick="enableMotion()">Enable Motion</button>
</div>
<div id="container">
<div id="board">
<div class="grid"></div>
<div id="ball"></div>
</div>
</div>
<script>
const board=document.getElementById("board");
const ball=document.getElementById("ball");
let x=138,y=138;
function update(alpha,beta,gamma){
document.getElementById("ori").innerHTML=`Orientation<br>α ${alpha.toFixed(1)}°<br>β ${beta.toFixed(1)}°<br>γ ${gamma.toFixed(1)}°`;
board.style.transform=`rotateX(${beta}deg) rotateY(${gamma}deg)`;
x=Math.max(0,Math.min(275,138+gamma*2));
y=Math.max(0,Math.min(275,138+beta*2));
ball.style.left=x+"px";
ball.style.top=y+"px";
}
function enableMotion(){
const ori=(e)=>update(e.alpha||0,e.beta||0,e.gamma||0);
const mot=(e)=>{
let a=e.accelerationIncludingGravity||{x:0,y:0,z:0};
document.getElementById("acc").innerHTML=`<br>Acceleration<br>X ${a.x.toFixed(2)}<br>Y ${a.y.toFixed(2)}<br>Z ${a.z.toFixed(2)}`;
let r=e.rotationRate||{};
document.getElementById("gyro").innerHTML=`<br>Gyroscope<br>α ${((r.alpha)||0).toFixed(2)}<br>β ${((r.beta)||0).toFixed(2)}<br>γ ${((r.gamma)||0).toFixed(2)}`;
};
if(typeof DeviceOrientationEvent!=="undefined"&&typeof DeviceOrientationEvent.requestPermission==="function"){
DeviceOrientationEvent.requestPermission().then(p=>{if(p==="granted"){window.addEventListener("deviceorientation",ori);window.addEventListener("devicemotion",mot);}});
}else{
window.addEventListener("deviceorientation",ori);
window.addEventListener("devicemotion",mot);
}
}
</script>
</body>
</html>
